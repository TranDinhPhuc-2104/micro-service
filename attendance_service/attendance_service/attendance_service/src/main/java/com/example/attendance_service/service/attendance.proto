syntax = "proto3";

package attendance;

// Định nghĩa Service
service AttendanceGRPCService {
  // Server Streaming gRPC (để ý từ khóa 'stream' ở kết quả trả về)
  rpc GetMonthlyAttendanceStream (MonthlyAttendanceRequest) returns (stream EmployeeAttendanceSummary);
}

// Yêu cầu lấy dữ liệu của tháng/năm cụ thể
message MonthlyAttendanceRequest {
  int32 month = 1;
  int32 year = 2;
}

// Dữ liệu trả về cho TỪNG nhân viên (sẽ được stream liên tục)
message EmployeeAttendanceSummary {
  int64 employee_id = 1;
  int32 total_present_days = 2;
  int32 total_late_days = 3;
  int32 total_absent_days = 4;
  double total_overtime_hours = 5;
}
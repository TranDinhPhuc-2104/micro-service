spring.application.name=employee

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/employee_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=NewPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=YourSuperSecretKeyThatIsAtLeast32CharactersLongForJWTValidation=
app.jwt.expirationMs=86400000

server.port=8085

grpc.server.port=9091
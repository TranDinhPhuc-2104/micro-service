syntax = "proto3";

package attendance;

option java_package = "com.example.grpc.attendance";
option java_multiple_files = true;

service AttendanceService {
  rpc StreamMonthlyAttendance (MonthlyAttendanceRequest) returns (stream AttendanceRecordResponse);
}

message MonthlyAttendanceRequest {
  int64 employee_id = 1;
  int32 month = 2;
}

message AttendanceRecordResponse {
  string attendance_date = 1;
  double overtime_hours = 2;
}